name: "descriptor_only_xgboost"
category: "chemistry_aware"
version: "1.0.0"

featurizer: "descriptor_only"
featurizer_params:
  aggregation: "mean"  # mean, sum, max, concat
  descriptor_set: "basic"  # basic, extended, all
  use_counts: true

model_type: "xgboost"
model_params:
  max_depth: 6
  n_estimators: 100
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 1.0
  tree_method: "hist"

random_seed: 42
n_seeds: 5
validation_metric: "rmse"
minimize_metric: true
