# Chemical and Modification Parsing Rules
# Version: 1.0.0
# Last Updated: 2026-04-02
#
# This file versions all assumptions and rules for parsing chemical modifications.
# Any change to parsing logic must increment the version and be logged.

version: "1.0.0"

# Supported modification formats
# To be expanded based on actual dataset formats during census
supported_formats:
  - helm  # HELM notation
  - fasta_brackets  # FASTA with modifications in brackets
  - smiles_attachment  # SMILES with attachment points
  - custom  # Dataset-specific (must be documented)

# Standard amino acids (for validation)
standard_amino_acids:
  single_letter: "ACDEFGHIKLMNPQRSTVWY"
  three_letter:
    - ALA
    - CYS
    - ASP
    - GLU
    - PHE
    - GLY
    - HIS
    - ILE
    - LYS
    - LEU
    - MET
    - ASN
    - PRO
    - GLN
    - ARG
    - SER
    - THR
    - VAL
    - TRP
    - TYR

# Common modifications (to be expanded during census)
common_modifications:
  n_terminal:
    - acetylation: "Ac-"
    - formylation: "Formyl-"
    - myristoylation: "Myr-"

  c_terminal:
    - amidation: "-NH2"
    - methylation: "-OMe"

  side_chain:
    - phosphorylation:
        residues: [S, T, Y]
        notation: "p{residue}"
    - methylation:
        residues: [K, R]
        notation: "Me{residue}"
    - acetylation:
        residues: [K]
        notation: "Ac{residue}"

  backbone:
    - d_amino_acids:
        notation: "d{residue}"
    - n_methylation:
        notation: "NMe{residue}"

  cyclization:
    - disulfide: "Cys-Cys bridge"
    - head_to_tail: "cyclic"
    - sidechain_backbone: "varies"

# Parsing validation rules
validation:
  # Reject sequences with these issues
  reject_if:
    - contains_unknown_residue: true
    - contains_ambiguous_modification: true
    - unparseable_notation: true
    - missing_modification_details: true

  # Log but potentially allow
  warn_if:
    - unusual_sequence_length: true  # outside typical range
    - rare_modification: true  # not in common list
    - incomplete_metadata: true

# Ambiguity handling
ambiguity_rules:
  # How to handle ambiguous cases
  multiple_modification_sites:
    action: "reject"  # or "resolve_if_possible"
    log: true

  unspecified_stereochemistry:
    action: "reject"  # Important for peptides
    log: true

  implicit_modifications:
    action: "reject"  # Require explicit annotation
    log: true

# Edit distance calculation
edit_operations:
  substitution:
    weight: 1.0
    include_modification_change: true

  insertion:
    weight: 1.0

  deletion:
    weight: 1.0

  modification_only:
    # Same sequence, different modification
    weight: 0.5  # Treat as half an edit for anchor purposes

# Anchor position definition
anchor_rules:
  # How to identify anchor positions for edits
  substitution_anchor: "position_of_change"
  insertion_anchor: "position_before_insertion"
  deletion_anchor: "position_of_deletion"
  modification_anchor: "modified_residue_position"

  # Context window around anchor
  context_window: 3  # residues on each side

# Logging
logging:
  log_all_parsing_failures: true
  log_ambiguous_cases: true
  log_rare_modifications: true
  save_examples: true  # Save examples of each exclusion type

# Dataset-specific overrides
# To be populated during census if datasets use different conventions
dataset_overrides: {}
