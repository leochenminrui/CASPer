benchmark:
  name: "CASPer primary descriptor ablation"
  splits: [random, sequence_cluster]
  seeds: [0, 1, 2, 3, 4]
  n_trials: 50
optuna:
  pruner: median
  n_startup_trials: 5
xgboost:
  search_space:
    n_estimators: [200, 2000]
    max_depth: [2, 10]
    learning_rate: [0.005, 0.2]
    subsample: [0.5, 1.0]
    colsample_bytree: [0.5, 1.0]
    min_child_weight: [1, 20]
    reg_alpha: [1.0e-8, 10.0]
    reg_lambda: [1.0e-8, 100.0]
    gamma: [0.0, 10.0]
  fixed_params:
    tree_method: hist
    early_stopping_rounds: 50
    verbosity: 0
    n_jobs: 8
output:
  base_dir: results/benchmark
  save_predictions: true
