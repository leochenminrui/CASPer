# Dataset Configuration
# Version: 1.1 — 2026-06-05
#
# This study is based on a single dataset: CycPeptMPDB (PAMPA subset).
# Entries for PepMSND and DBAASP were removed before submission to avoid
# repository–manuscript inconsistency. Skeleton converters for those datasets
# are archived in archived/future_extension/.

datasets:
  cycpeptmpdb:
    name: "CycPeptMPDB"
    subset: "PAMPA"
    priority: "HIGH"
    task_type: "regression"
    target_property: "membrane_permeability"  # log permeability / logP_exp

    source:
      url: "https://cycpeptmpdb.com"
      citation: null
      download_date: null

    expected_fields:
      - sequence
      - modifications  # monomer list notation
      - permeability_value
      - experimental_conditions

    filtering_criteria:
      - "PAMPA subset only"
      - "Valid permeability measurement"
      - "Parseable sequence and modifications"

    notes: |
      Primary and sole dataset for the CASPer study.
      Cyclic peptides with PAMPA membrane permeability data.
      PAMPA = Parallel Artificial Membrane Permeability Assay

# Global settings
global:
  min_sequence_length: 3
  max_sequence_length: 50

  # Data splitting
  train_fraction: 0.7
  val_fraction: 0.15
  test_fraction: 0.15
  random_seed: 42

  # Quality control
  exclude_ambiguous_modifications: true
  exclude_missing_values: true
  log_all_exclusions: true
